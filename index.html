<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0"/>
<title>Stencil Lab — Professional Tattoo Tools</title>
<script async src="https://js.stripe.com/v3/pricing-table.js"></script>
<style>
/* ── DESIGN TOKENS ─────────────────────────────────────────────── */
:root {
  --bg:       #050505;
  --surface:  #0c0c0c;
  --surface2: #141414;
  --surface3: #1a1a1a;
  --border:   #202020;
  --border2:  #2a2a2a;
  --border3:  #383838;
  --text:     #f5f5f5;
  --text2:    #b0b0b0;
  --text3:    #555;
  --text4:    #2a2a2a;
  --accent:   #e8e8e8;
  --accent2:  #c0c0c0;
  --gold:     #d4d4d4;
  --gold2:    #a0a0a0;
  --ink:      #111;
  --success:  #aaa;
  --warning:  #ccc;
  --error:    #888;
  --radius:   6px;
  --radius2:  10px;
  --radius3:  14px;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html{scroll-behavior:smooth}
body{
  background:var(--bg);
  color:var(--text);
  font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
  min-height:100vh;
  overflow-x:hidden;
  -webkit-font-smoothing:antialiased;
}

/* ── NOISE TEXTURE OVERLAY ─────────────────────────────────────── */
body::before{
  content:'';
  position:fixed;inset:0;
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.03'/%3E%3C/svg%3E");
  pointer-events:none;
  z-index:0;
  opacity:.08;
}

/* ── LAYOUT ────────────────────────────────────────────────────── */
.app-shell{display:flex;min-height:100vh;position:relative;z-index:1}
.sidebar{
  width:260px;
  background:var(--surface);
  border-right:1px solid var(--border);
  display:flex;flex-direction:column;
  position:fixed;top:0;left:0;height:100vh;z-index:50;
  transition:.3s ease;
}
.main{flex:1;margin-left:260px;min-height:100vh;padding-bottom:90px}
.page{padding:36px;max-width:1100px}

/* ── SIDEBAR ───────────────────────────────────────────────────── */
.sidebar-header{
  padding:18px 20px 14px;
  border-bottom:1px solid var(--border);
  display:flex;align-items:center;gap:14px;
}
.logo-mark{
  width:40px;height:40px;
  background:linear-gradient(135deg,#fff,#888);
  border-radius:10px;
  display:flex;align-items:center;justify-content:center;
  flex-shrink:0;
  box-shadow:0 4px 16px rgba(255,255,255,.15);
}
.logo-text{
  font-family:'Bebas Neue',Impact,'Arial Narrow',sans-serif;
  font-size:22px;letter-spacing:4px;
  background:linear-gradient(135deg,#fff,#aaa);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
}
.logo-sub{font-size:9px;color:var(--text3);letter-spacing:3px;margin-top:1px;text-transform:uppercase}

.sidebar-nav{flex:1;padding:12px 14px;overflow-y:auto}
.nav-group-label{
  font-family:'Bebas Neue',Impact,'Arial Narrow',sans-serif;
  font-size:10px;letter-spacing:3px;color:var(--text3);
  padding:8px 8px 4px;
}
.nav-item{
  display:flex;align-items:center;gap:11px;
  padding:9px 12px;border-radius:var(--radius);
  cursor:pointer;font-size:13px;color:var(--text2);
  transition:.15s;margin-bottom:1px;
  border:1px solid transparent;
}
.nav-item:hover{background:var(--surface2);color:var(--text)}
.nav-item.active{
  background:rgba(255,255,255,.06);
  color:#fff;
  border-color:rgba(255,255,255,.15);
}
.nav-item svg{width:15px;height:15px;flex-shrink:0}
.nav-badge{
  margin-left:auto;
  font-family:'Bebas Neue',Impact,'Arial Narrow',sans-serif;
  font-size:9px;letter-spacing:1px;
  padding:2px 7px;border-radius:4px;
  background:rgba(230,57,70,.15);color:var(--accent);
}
.nav-badge.gold{background:rgba(201,168,76,.15);color:var(--gold)}

.sidebar-footer{
  padding:12px;
  border-top:1px solid var(--border);
}
.user-profile-card{
  background:var(--surface2);
  border:1px solid var(--border2);
  border-radius:var(--radius2);
  padding:11px;
  cursor:pointer;
  transition:.15s;
}
.user-profile-card:hover{border-color:var(--border3)}
.user-avatar-large{
  width:38px;height:38px;border-radius:50%;
  background:linear-gradient(135deg,#333,#111);
  border:1px solid rgba(255,255,255,.15);
  display:flex;align-items:center;justify-content:center;
  font-family:'Bebas Neue',Impact,'Arial Narrow',sans-serif;font-size:16px;color:#fff;
  flex-shrink:0;
}
.user-name{font-size:13px;font-weight:600;color:var(--text)}
.user-handle{font-size:11px;color:var(--text3);margin-top:1px}
.plan-pill{
  display:inline-flex;align-items:center;gap:4px;
  margin-top:6px;padding:3px 9px;border-radius:20px;
  font-family:'Bebas Neue',Impact,'Arial Narrow',sans-serif;font-size:10px;letter-spacing:1.5px;
}
.plan-pill.trial{background:rgba(255,255,255,.06);color:#aaa;border:1px solid rgba(255,255,255,.12)}
.plan-pill.pro{background:rgba(255,255,255,.08);color:#ddd;border:1px solid rgba(255,255,255,.18)}
.plan-pill.sponsored{background:rgba(255,255,255,.1);color:#fff;border:1px solid rgba(255,255,255,.25)}
.sign-out-btn{
  width:100%;margin-top:10px;height:38px;
  border-radius:var(--radius);border:1px solid rgba(255,255,255,.12);
  background:rgba(255,255,255,.03);cursor:pointer;
  font-family:'Bebas Neue',Impact,'Arial Narrow',sans-serif;font-size:12px;letter-spacing:2px;
  color:#666;display:flex;align-items:center;justify-content:center;gap:6px;
  transition:.15s;
}
.sign-out-btn:hover{border-color:rgba(255,255,255,.25);color:#ccc;background:rgba(255,255,255,.06)}

/* ── MOBILE HEADER ─────────────────────────────────────────────── */
.mobile-header{
  display:none;
  align-items:center;justify-content:space-between;
  padding:14px 18px;
  background:rgba(8,8,8,.95);
  backdrop-filter:blur(12px);
  border-bottom:1px solid var(--border);
  position:sticky;top:0;z-index:40;
}
.mobile-header-title{
  font-family:'Bebas Neue',Impact,'Arial Narrow',sans-serif;
  font-size:18px;letter-spacing:3px;color:var(--text);
}
.mobile-logout{
  background:rgba(255,255,255,.06);
  border:1px solid rgba(255,255,255,.2);
  border-radius:6px;cursor:pointer;
  padding:7px 14px;
  font-family:'Bebas Neue',Impact,'Arial Narrow',sans-serif;
  font-size:11px;letter-spacing:1.5px;color:#ccc;
  display:flex;align-items:center;gap:6px;
}
.mobile-logout:hover{background:rgba(255,255,255,.1);color:#fff}

/* ── TAB BAR ───────────────────────────────────────────────────── */
.tab-bar{
  display:none;
  position:fixed;bottom:0;left:0;right:0;
  background:rgba(8,8,8,.97);
  backdrop-filter:blur(20px);
  border-top:1px solid var(--border);
  z-index:100;
  padding:6px 0 calc(6px + env(safe-area-inset-bottom));
}
.tab-item{
  flex:1;display:flex;flex-direction:column;align-items:center;
  justify-content:center;gap:3px;padding:6px 4px;
  background:none;border:none;cursor:pointer;
  color:var(--text3);transition:.15s;
}
.tab-item.active{color:#fff}
.tab-item svg{width:20px;height:20px}
.tab-label{font-family:'Bebas Neue',Impact,'Arial Narrow',sans-serif;font-size:9px;letter-spacing:1.5px}
.tab-create .tab-icon-wrap{
  width:48px;height:48px;
  background:linear-gradient(135deg,#fff,#bbb);
  border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  margin-top:-20px;
  border:3px solid var(--bg);
  box-shadow:0 4px 20px rgba(255,255,255,.2);
}
.tab-create svg{width:20px;height:20px;stroke:#000!important}
.tab-create.active .tab-icon-wrap{box-shadow:0 4px 24px rgba(255,255,255,.3)}

/* ── PAGE HEADER ───────────────────────────────────────────────── */
.page-header{margin-bottom:28px}
.page-title{
  font-family:'Bebas Neue',Impact,'Arial Narrow',sans-serif;
  font-size:36px;letter-spacing:5px;line-height:1;
  background:linear-gradient(135deg,#fff 40%,#666);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
}
.page-title span{
  background:linear-gradient(135deg,#fff,#888);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
}
.page-subtitle{font-size:13px;color:var(--text3);margin-top:6px;letter-spacing:.5px}

/* ── CARDS ─────────────────────────────────────────────────────── */
.card{
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:var(--radius2);
  padding:22px;
}
.card-dark{
  background:var(--surface2);
  border:1px solid var(--border2);
  border-radius:var(--radius2);
  padding:22px;
}
.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:24px}
.grid-3{display:grid;grid-template-columns:repeat(3,1fr);gap:16px}

/* ── TOOL CARDS ────────────────────────────────────────────────── */
.tool-card{
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:var(--radius2);
  padding:22px;cursor:pointer;
  transition:.2s;position:relative;overflow:hidden;
}
.tool-card::before{
  content:'';position:absolute;inset:0;
  background:linear-gradient(135deg,rgba(230,57,70,.04),transparent);
  opacity:0;transition:.2s;
}
.tool-card:hover{border-color:rgba(230,57,70,.25)}
.tool-card:hover::before{opacity:1}
.tool-icon{
  width:46px;height:46px;border-radius:var(--radius);
  display:flex;align-items:center;justify-content:center;
  margin-bottom:16px;
  background:rgba(230,57,70,.08);
  border:1px solid rgba(230,57,70,.15);
}
.tool-title{
  font-family:'Bebas Neue',Impact,'Arial Narrow',sans-serif;
  font-size:18px;letter-spacing:2.5px;
  line-height:1.2;margin-bottom:8px;
}
.tool-desc{font-size:12px;color:var(--text3);line-height:1.6}
.tool-tag{
  margin-top:14px;
  display:inline-flex;
  font-family:'Bebas Neue',Impact,'Arial Narrow',sans-serif;
  font-size:9px;letter-spacing:1.5px;
  padding:3px 9px;border-radius:4px;
}
.tag-red{background:rgba(230,57,70,.12);color:var(--accent)}
.tag-purple{background:rgba(139,92,246,.12);color:#a78bfa}
.tag-gold{background:rgba(201,168,76,.12);color:var(--gold)}

/* ── FORMS ─────────────────────────────────────────────────────── */
.label{
  font-family:'Bebas Neue',Impact,'Arial Narrow',sans-serif;
  font-size:11px;letter-spacing:2.5px;
  color:var(--text3);margin-bottom:7px;display:block;
}
.input{
  width:100%;
  background:var(--surface2);
  border:1px solid var(--border2);
  color:var(--text);
  border-radius:var(--radius);
  padding:12px 14px;
  font-size:14px;
  font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
  outline:none;transition:.15s;
}
.input:focus{border-color:rgba(255,255,255,.3);background:var(--surface3)}
textarea.input{min-height:90px;resize:vertical;line-height:1.5}
.input-group{margin-bottom:14px}
.input-row{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:14px}

/* ── BUTTONS ───────────────────────────────────────────────────── */
.btn{
  display:inline-flex;align-items:center;justify-content:center;gap:8px;
  padding:0 20px;height:46px;border-radius:var(--radius);
  font-family:'Bebas Neue',Impact,'Arial Narrow',sans-serif;font-size:15px;letter-spacing:2px;
  cursor:pointer;transition:.15s;border:none;white-space:nowrap;
}
.btn-primary{
  background:linear-gradient(135deg,#fff,#d0d0d0);
  color:#000;
  box-shadow:0 4px 16px rgba(255,255,255,.12);
}
.btn-primary:hover{box-shadow:0 6px 20px rgba(255,255,255,.18);transform:translateY(-1px)}
.btn-primary:disabled{background:rgba(255,255,255,.15);color:#555;box-shadow:none;transform:none;cursor:not-allowed}
.btn-outline{
  background:transparent;
  border:1px solid var(--border2);
  color:var(--text2);
}
.btn-outline:hover{border-color:var(--border3);color:var(--text)}
.btn-ghost{background:transparent;border:none;color:var(--text3)}
.btn-ghost:hover{color:var(--text2)}
.btn-full{width:100%}
.btn-sm{height:34px;font-size:12px;padding:0 14px}

/* ── UPLOAD ZONE ───────────────────────────────────────────────── */
.upload-zone{
  position:relative;
  border:1.5px dashed var(--border2);
  border-radius:var(--radius2);
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;overflow:hidden;transition:.2s;
  background:var(--surface2);
}
.upload-zone:hover{border-color:rgba(255,255,255,.25);background:var(--surface3)}
.upload-zone.has-image{border-style:solid;border-color:var(--border)}
.upload-overlay{
  position:absolute;inset:0;
  background:rgba(0,0,0,.6);
  display:flex;align-items:center;justify-content:center;
  opacity:0;transition:.2s;
}
.upload-zone:hover .upload-overlay{opacity:1}

/* ── SPINNER ───────────────────────────────────────────────────── */
.spinner{
  width:18px;height:18px;
  border:2px solid rgba(255,255,255,.2);
  border-top-color:#fff;
  border-radius:50%;
  animation:spin .7s linear infinite;
  display:inline-block;
}
@keyframes spin{to{transform:rotate(360deg)}}

/* ── TOAST ─────────────────────────────────────────────────────── */
.toast{
  position:fixed;bottom:100px;left:50%;
  transform:translateX(-50%);
  padding:12px 22px;border-radius:var(--radius);
  font-size:14px;font-weight:500;z-index:400;
  white-space:nowrap;
  box-shadow:0 8px 32px rgba(0,0,0,.5);
  animation:toastIn .25s ease;
}
.toast.success{background:var(--success);color:#fff}
.toast.error{background:var(--error);color:#fff}
@keyframes toastIn{from{opacity:0;transform:translateX(-50%) translateY(10px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}

/* ── AUTH SCREEN ───────────────────────────────────────────────── */
.auth-wrap{
  min-height:100vh;display:flex;
  background:var(--bg);
  position:relative;overflow:hidden;
  z-index:1;
}
.auth-left{
  flex:1;display:flex;align-items:center;justify-content:center;
  padding:40px;position:relative;
  background:linear-gradient(135deg,#0a0a0a,#080808);
}
.auth-left-bg{
  position:absolute;inset:0;
  background:
    radial-gradient(ellipse 60% 80% at 30% 50%, rgba(255,255,255,.03), transparent),
    radial-gradient(ellipse 40% 60% at 80% 20%, rgba(255,255,255,.02), transparent);
}
.auth-brand{position:relative;z-index:1;max-width:380px}
.auth-brand-logo{
  display:flex;align-items:center;gap:16px;margin-bottom:40px;
}
.auth-brand-mark{
  width:56px;height:56px;
  background:linear-gradient(135deg,#fff,#aaa);
  border-radius:14px;
  display:flex;align-items:center;justify-content:center;
  box-shadow:0 8px 32px rgba(255,255,255,.15);
}
.auth-brand-name{
  font-family:'Bebas Neue',Impact,'Arial Narrow',sans-serif;
  font-size:32px;letter-spacing:5px;
  background:linear-gradient(135deg,#fff,#888);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
}
.auth-brand-tagline{font-size:11px;color:var(--text3);letter-spacing:3px;margin-top:2px}
.auth-headline{
  font-family:'Bebas Neue',Impact,'Arial Narrow',sans-serif;
  font-size:52px;line-height:.95;letter-spacing:3px;margin-bottom:20px;
}
.auth-headline span{
  background:linear-gradient(135deg,#fff,#777);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
}
.auth-features{list-style:none;display:flex;flex-direction:column;gap:12px}
.auth-features li{
  display:flex;align-items:center;gap:12px;
  font-size:14px;color:var(--text2);
}
.auth-features li::before{
  content:'';width:6px;height:6px;
  border-radius:50%;background:#888;flex-shrink:0;
}

.auth-right{
  width:440px;flex-shrink:0;
  background:var(--surface);
  border-left:1px solid var(--border);
  display:flex;align-items:center;justify-content:center;
  padding:40px 36px;
}
.auth-card{width:100%}
.auth-tabs{
  display:flex;gap:0;margin-bottom:28px;
  border:1px solid var(--border2);border-radius:var(--radius);overflow:hidden;
}
.auth-tab{
  flex:1;height:42px;border:none;cursor:pointer;
  font-family:'Bebas Neue',Impact,'Arial Narrow',sans-serif;font-size:14px;letter-spacing:2px;
  background:transparent;color:var(--text3);transition:.15s;
}
.auth-tab.active{background:#fff;color:#000}
.auth-divider{
  text-align:center;color:var(--text3);font-size:12px;
  margin:18px 0;position:relative;
}
.auth-divider::before,.auth-divider::after{
  content:'';position:absolute;top:50%;width:44%;height:1px;
  background:var(--border);
}
.auth-divider::before{left:0}.auth-divider::after{right:0}
.error-msg{
  background:rgba(239,68,68,.08);border:1px solid rgba(239,68,68,.25);
  color:var(--error);border-radius:var(--radius);
  padding:10px 14px;font-size:13px;margin-bottom:14px;
}

/* ── ONBOARDING ────────────────────────────────────────────────── */
.onboard-wrap{
  min-height:100vh;background:var(--bg);
  display:flex;align-items:center;justify-content:center;
  padding:24px;
}
.onboard-card{
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:var(--radius3);
  padding:40px 36px;
  width:100%;max-width:520px;
}
.onboard-step{
  font-family:'Bebas Neue',Impact,'Arial Narrow',sans-serif;
  font-size:11px;letter-spacing:3px;color:#aaa;
  margin-bottom:8px;
}
.onboard-title{
  font-family:'Bebas Neue',Impact,'Arial Narrow',sans-serif;
  font-size:32px;letter-spacing:3px;margin-bottom:6px;
}
.onboard-sub{font-size:13px;color:var(--text3);margin-bottom:28px}
.progress-dots{display:flex;gap:6px;margin-bottom:28px}
.progress-dot{width:28px;height:4px;border-radius:2px;background:var(--border2);transition:.3s}
.progress-dot.active{background:#fff}
.progress-dot.done{background:#555}

/* ── PROFILE PAGE ──────────────────────────────────────────────── */
.profile-hero{
  background:linear-gradient(135deg,var(--surface),var(--surface2));
  border:1px solid var(--border);
  border-radius:var(--radius2);
  padding:28px;margin-bottom:20px;
  display:flex;align-items:center;gap:20px;
  position:relative;overflow:hidden;
}
.profile-hero::before{
  content:'';position:absolute;right:-40px;top:-40px;
  width:200px;height:200px;
  border-radius:50%;
  background:radial-gradient(circle,rgba(230,57,70,.06),transparent);
}
.profile-avatar-xl{
  width:72px;height:72px;border-radius:50%;flex-shrink:0;
  background:linear-gradient(135deg,#333,#111);
  border:1px solid rgba(255,255,255,.15);
  display:flex;align-items:center;justify-content:center;
  font-family:'Bebas Neue',Impact,'Arial Narrow',sans-serif;font-size:28px;color:#fff;
  box-shadow:0 8px 24px rgba(230,57,70,.3);
}
.profile-name{
  font-family:'Bebas Neue',Impact,'Arial Narrow',sans-serif;
  font-size:28px;letter-spacing:3px;line-height:1;
}
.profile-handle{font-size:13px;color:var(--text3);margin-top:4px}
.profile-meta{font-size:12px;color:var(--text3);margin-top:3px}

.subscription-card{
  background:linear-gradient(135deg,rgba(255,255,255,.04),rgba(255,255,255,.01));
  border:1px solid rgba(255,255,255,.1);
  border-radius:var(--radius2);
  padding:22px;
}
.sub-plan-name{
  font-family:'Bebas Neue',Impact,'Arial Narrow',sans-serif;
  font-size:32px;letter-spacing:3px;
  background:linear-gradient(135deg,var(--accent),var(--gold));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
}
.usage-bar-bg{
  height:5px;background:var(--border);border-radius:3px;
  margin-top:6px;overflow:hidden;
}
.usage-bar-fill{height:100%;border-radius:3px;transition:.5s ease}

/* ── STENCIL MODE CARDS ────────────────────────────────────────── */
.mode-card{
  padding:14px 16px;border-radius:var(--radius);cursor:pointer;
  border:1px solid var(--border);
  background:var(--surface2);
  transition:.15s;margin-bottom:8px;
  display:flex;align-items:center;gap:14px;
}
.mode-card:hover{border-color:var(--border3)}
.mode-card.active-simple{border-color:#fff;background:rgba(255,255,255,.04)}
.mode-card.active-moderate{border-color:#ccc;background:rgba(255,255,255,.03)}
.mode-card.active-expert{border-color:#aaa;background:rgba(255,255,255,.03)}
.mode-radio{
  width:18px;height:18px;border-radius:50%;flex-shrink:0;
  border:1.5px solid var(--border2);
  display:flex;align-items:center;justify-content:center;
}

/* ── BEFORE/AFTER ──────────────────────────────────────────────── */
.ba-wrap{position:relative;overflow:hidden;border-radius:var(--radius2);user-select:none}
.ba-before,.ba-after{position:absolute;top:0;left:0;width:100%;height:100%}
.ba-after{overflow:hidden}
.ba-after img{position:absolute;top:0;left:0;height:100%;max-width:none}
.ba-divider{position:absolute;top:0;bottom:0;width:2px;background:#fff;transform:translateX(-50%)}
.ba-handle{
  position:absolute;top:50%;
  transform:translate(-50%,-50%);
  width:40px;height:40px;border-radius:50%;
  background:#fff;cursor:ew-resize;
  display:flex;align-items:center;justify-content:center;
  box-shadow:0 2px 12px rgba(0,0,0,.5);
}
.ba-label{
  position:absolute;top:12px;
  background:rgba(0,0,0,.7);color:#fff;
  font-family:'Bebas Neue',Impact,'Arial Narrow',sans-serif;font-size:11px;letter-spacing:2px;
  padding:4px 10px;border-radius:4px;
}

/* ── MODAL OVERLAY ─────────────────────────────────────────────── */
.modal-overlay{
  position:fixed;inset:0;background:rgba(0,0,0,.85);
  z-index:200;display:flex;align-items:flex-end;justify-content:center;
}
.modal-sheet{
  background:var(--surface);
  border-radius:var(--radius3) var(--radius3) 0 0;
  padding:28px 24px 36px;width:100%;max-width:480px;
}
.sheet-handle{
  width:40px;height:4px;background:var(--border2);
  border-radius:2px;margin:0 auto 24px;
}

/* ── DIVIDER ───────────────────────────────────────────────────── */
.divider{height:1px;background:var(--border);margin:20px 0}

/* ── RANGE SLIDER ──────────────────────────────────────────────── */
input[type=range]{
  -webkit-appearance:none;width:100%;height:4px;
  background:var(--border2);border-radius:2px;outline:none;
}
input[type=range]::-webkit-slider-thumb{
  -webkit-appearance:none;width:18px;height:18px;
  border-radius:50%;background:#fff;cursor:pointer;
  box-shadow:0 2px 8px rgba(255,255,255,.2);
}

/* ── ADMIN TABLE ───────────────────────────────────────────────── */
.admin-table{width:100%;border-collapse:collapse}
.admin-table th{
  text-align:left;padding:10px 14px;
  font-family:'Bebas Neue',Impact,'Arial Narrow',sans-serif;font-size:10px;
  letter-spacing:2px;color:var(--text3);
  border-bottom:1px solid var(--border);
}
.admin-table td{padding:12px 14px;border-bottom:1px solid var(--border);font-size:13px}
.admin-table tr:last-child td{border-bottom:none}
.admin-action-btn{
  padding:4px 10px;border-radius:4px;
  font-family:'Bebas Neue',Impact,'Arial Narrow',sans-serif;font-size:10px;letter-spacing:1px;
  cursor:pointer;border:1px solid;margin-bottom:3px;display:block;
}

/* ── RESPONSIVE ────────────────────────────────────────────────── */
@media(max-width:900px){
  .auth-left{display:none}
  .auth-right{width:100%;border-left:none}
}
@media(max-width:768px){
  .sidebar{display:none}
  .main{margin-left:0}
  .page{padding:16px 16px 100px}
  .mobile-header{display:flex}
  .tab-bar{display:flex}
  .grid-2{grid-template-columns:1fr}
  .grid-3{grid-template-columns:1fr}
  .profile-hero{flex-direction:column;text-align:center}
  .input-row{grid-template-columns:1fr}
}
</style>

<body>
<canvas id="stencilCanvas" style="display:none"></canvas>
<div id="root" style="position:relative;z-index:1;min-height:100vh"></div>
<script>

var STATE = {
  page: 'auth',
  authMode: 'login',
  authStep: 'credentials',  // credentials | onboard
  onboardStep: 0,           // 0=personal 1=social 2=done
  user: null,
  toast: null,
  paywall: false,
  stencilInput: null,
  stencilOutput: null,
  stencilLoading: false,
  stencilEdges: null,
  stencilSettings: { level: 'simple', lineIntensity: 0.85 },
  enhanceInput: null,
  enhanceOutput: null,
  enhanceLoading: false,

  genPrompt: '',
  genPalette: 'bw',
  genOutput: null,
  genLoading: false,

  searchQuery: '',

  stencilLora: '',
  imageLoraModel: '',
  apiKey: (function(){ var h=''; try { return localStorage.getItem('sl_api_key')||h; } catch(e){ return h; } })(),
  stripeKey: (function(){ try { return localStorage.getItem('sl_stripe_key') || 'PASTE_YOUR_STRIPE_PUBLISHABLE_KEY_HERE'; } catch(e){ return 'PASTE_YOUR_STRIPE_PUBLISHABLE_KEY_HERE'; } })(),
  stripePrices: (function(){
    try {
      var raw = localStorage.getItem('sl_stripe_prices');
      if (raw) { var p = JSON.parse(raw); if (p && typeof p === 'object') return p; }
    } catch(e){}
    return { basic:'PASTE_BASIC_PRICE_ID', pro:'PASTE_PRO_PRICE_ID', duo:'PASTE_DUO_PRICE_ID', studio:'PASTE_STUDIO_PRICE_ID' };
  })(),
  adminStats: { total:247, active:189, trial:43, cancelled:15 },
  users: [
    { id:'1', email:'jake@gmail.com', name:'Jake Morrison', plan:'pro', active:true, freeAccess:false, discount:0, role:'user', sponsored:false, instagram:'@jakemorrisson_ink', dob:'1990-05-12' },
    { id:'2', email:'luna@studio.com', name:'Luna Ink', plan:'studio', active:true, freeAccess:true, discount:15, role:'user', sponsored:true, instagram:'@luna.ink.studio', dob:'1995-03-28' },
    { id:'6', email:'stencillabadmin@gmail.com', name:'Studio Admin', plan:'sponsored', active:true, freeAccess:true, discount:100, role:'super_admin', sponsored:true, instagram:'@stencillab', dob:'' }
  ]
};

// ── RENDER ─────────────────────────────────────────────────────────────────
function render() {
  var root = document.getElementById('root');
  if (!root) return;

  if (STATE.page === 'auth') {
    root.innerHTML = STATE.authStep === 'onboard' ? renderOnboard() : renderAuth();
  } else {
    var html = '';
    html += '<div class="app-shell">';
    html += renderSidebar();
    html += '<div class="main">';
    html += renderMobileHeader();
    html += '<div class="page">' + renderPage() + '</div>';
    html += '</div></div>';
    html += renderTabBar();
    if (STATE.paywall) html += renderPaywall();
    if (STATE.toast)   html += '<div class="toast ' + STATE.toast.type + '">' + STATE.toast.msg + '</div>';
    root.innerHTML = html;
  }
  attachEvents();
}

// ── AUTH ────────────────────────────────────────────────────────────────────
function renderAuth() {
  var isLogin = STATE.authMode === 'login';
  return (
    '<div class="auth-wrap">' +

    // Left: brand panel
    '<div class="auth-left">' +
    '<div class="auth-left-bg"></div>' +
    '<div class="auth-brand">' +
    '<div class="auth-brand-logo">' +
    '<div class="auth-brand-mark">' + logoSVG(28,'#111') + '</div>' +
    '<div><div class="auth-brand-name">STENCIL LAB</div>' +
    '<div class="auth-brand-tagline">PROFESSIONAL TATTOO TOOLS</div></div>' +
    '</div>' +
    '<div class="auth-headline">THE FUTURE<br>OF <span>TATTOO</span><br>STENCILS</div>' +
    '<ul class="auth-features">' +
    '<li>AI-powered professional stencil generation</li>' +
    '<li>Photo enhancement to 4K quality</li>' +
    '<li>Cinematic tattoo reference art</li>' +
    '<li>Used by professional studios worldwide</li>' +
    '</ul>' +
    '</div></div>' +

    // Right: form
    '<div class="auth-right"><div class="auth-card">' +
    '<div class="auth-tabs">' +
    '<button class="auth-tab' + (!isLogin?' active':'') + '" id="tab-signup">CREATE ACCOUNT</button>' +
    '<button class="auth-tab' + (isLogin?' active':'') + '" id="tab-login">SIGN IN</button>' +
    '</div>' +
    '<div id="auth-error" class="error-msg" style="display:none"></div>' +
    (!isLogin ? '<div class="input-row"><div><label class="label">FIRST NAME</label><input class="input" id="auth-fname" placeholder="First name"/></div><div><label class="label">LAST NAME</label><input class="input" id="auth-lname" placeholder="Last name"/></div></div>' : '') +
    '<div class="input-group"><label class="label">EMAIL ADDRESS</label><input class="input" id="auth-email" type="email" placeholder="your@email.com"/></div>' +
    '<div class="input-group"><label class="label">PASSWORD</label><input class="input" id="auth-pass" type="password" placeholder="' + (isLogin?'Enter password':'Min 8 characters') + '"/></div>' +
    '<button class="btn btn-primary btn-full" id="auth-submit" style="height:52px;font-size:17px;margin-top:4px">' + (isLogin?'SIGN IN':'CREATE FREE ACCOUNT') + '</button>' +
    (!isLogin ? '<div style="text-align:center;font-size:11px;color:var(--text3);margin-top:12px">7-day free trial &middot; No credit card required</div>' : '') +
    '</div></div>' +

    '</div>'
  );
}

// ── ONBOARDING ──────────────────────────────────────────────────────────────
function renderOnboard() {
  var step = STATE.onboardStep;
  var steps = ['PERSONAL INFO', 'SOCIAL & DOB', 'ALL SET'];
  var u = STATE.user || {};

  var content = '';

  if (step === 0) {
    content =
      '<div class="input-row">' +
      '<div><label class="label">FIRST NAME</label><input class="input" id="ob-fname" placeholder="First name" value="' + (u.fname||'') + '"/></div>' +
      '<div><label class="label">LAST NAME</label><input class="input" id="ob-lname" placeholder="Last name" value="' + (u.lname||'') + '"/></div>' +
      '</div>' +
      '<div class="input-group"><label class="label">EMAIL</label><input class="input" id="ob-email" type="email" placeholder="your@email.com" value="' + (u.email||'') + '" readonly style="opacity:.6"/></div>' +
      '<div class="input-group"><label class="label">PHONE (OPTIONAL)</label><input class="input" id="ob-phone" type="tel" placeholder="+44 7700 000000" value="' + (u.phone||'') + '"/></div>';
  } else if (step === 1) {
    content =
      '<div class="input-group"><label class="label">INSTAGRAM HANDLE</label>' +
      '<div style="position:relative"><span style="position:absolute;left:14px;top:50%;transform:translateY(-50%);color:var(--text3);font-size:14px">@</span>' +
      '<input class="input" id="ob-instagram" placeholder="yourtattoopage" value="' + (u.instagram||'').replace('@','') + '" style="padding-left:30px"/></div></div>' +
      '<div class="input-group"><label class="label">DATE OF BIRTH</label><input class="input" id="ob-dob" type="date" value="' + (u.dob||'') + '"/></div>' +
      '<div class="input-group"><label class="label">STUDIO / BUSINESS NAME (OPTIONAL)</label><input class="input" id="ob-studio" placeholder="e.g. Dark Arts Tattoo Studio" value="' + (u.studio||'') + '"/></div>';
  } else {
    content =
      '<div style="text-align:center;padding:20px 0">' +
      '<div style="width:72px;height:72px;border-radius:50%;background:linear-gradient(135deg,var(--accent),var(--accent2));display:flex;align-items:center;justify-content:center;margin:0 auto 20px;box-shadow:0 8px 32px rgba(230,57,70,.4)">' +
      '<svg width="32" height="32" fill="none" viewBox="0 0 24 24" stroke="#fff" stroke-width="2.5"><polyline points="20 6 9 17 4 12"/></svg></div>' +
      '<div style="font-family:Bebas Neue,sans-serif;font-size:28px;letter-spacing:3px;margin-bottom:8px">WELCOME, ' + (u.fname||'ARTIST').toUpperCase() + '</div>' +
      '<div style="font-size:14px;color:var(--text3);margin-bottom:24px">Your account is ready. You&apos;re on a <strong style="color:var(--warning)">7-day free trial</strong>.</div>' +
      '<div style="background:var(--surface2);border:1px solid var(--border2);border-radius:var(--radius2);padding:20px;text-align:left;margin-bottom:24px">' +
      '<div style="font-family:Bebas Neue,sans-serif;font-size:11px;letter-spacing:2.5px;color:var(--text3);margin-bottom:12px">YOUR PROFILE</div>' +
      '<div style="display:flex;gap:12px;align-items:center;margin-bottom:10px">' +
      '<div style="width:44px;height:44px;border-radius:50%;background:linear-gradient(135deg,var(--accent),var(--accent2));display:flex;align-items:center;justify-content:center;font-family:Bebas Neue,sans-serif;font-size:18px;color:#fff">' + (u.fname||'A').charAt(0).toUpperCase() + '</div>' +
      '<div><div style="font-weight:600;font-size:15px">' + (u.fname||'') + ' ' + (u.lname||'') + '</div>' +
      '<div style="font-size:12px;color:var(--text3)">' + u.email + '</div>' +
      (u.instagram ? '<div style="font-size:12px;color:var(--text3)">@' + u.instagram.replace('@','') + '</div>' : '') +

  }

    '<div class="onboard-card">' +
    '<div style="display:flex;align-items:center;gap:10px;margin-bottom:24px">' +

    '</div>' +
    '</div></div>'
  );
}

// ── SIDEBAR ─────────────────────────────────────────────────────────────────

  var isAdmin = STATE.user && STATE.user.role === 'super_admin';
  var u = STATE.user || {};
  function ni(id, icon, label, badge) {

  }

  return '<div class="sidebar">' +

    '<div class="logo-mark">' + logoSVG(20,'#111') + '</div>' +

    '</div>' +
    '<div class="sidebar-nav">' +
    '<div class="nav-group-label">TOOLS</div>' +

    ni('enhance',  '<path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z"/>', 'Photo Enhancer', {t:'AI', gold:true}) +
    ni('generate', '<path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/>', 'AI Creator', {t:'AI', gold:true}) +
    '<div class="nav-group-label">ACCOUNT</div>' +
    ni('profile',  '<path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/>', 'My Profile') +
    ni('subscription','<path d="M21 4H8m0 0a2 2 0 00-2-2 2 2 0 00-2 2m4 0v16"/>', 'Subscription') +
    (isAdmin ? '<div class="nav-group-label">ADMIN</div>' + ni('admin','<path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>', 'Admin Dashboard') + ni('settings','<circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-4 0v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83-2.83l.06-.06A1.65 1.65 0 004.68 15a1.65 1.65 0 00-1.51-1H3a2 2 0 010-4h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 012.83-2.83l.06.06A1.65 1.65 0 009 4.68a1.65 1.65 0 001-1.51V3a2 2 0 014 0v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 2.83l-.06.06A1.65 1.65 0 0019.4 9a1.65 1.65 0 001.51 1H21a2 2 0 010 4h-.09a1.65 1.65 0 00-1.51 1z"/>', 'Settings') : '') +

    '<div style="display:flex;align-items:center;gap:10px">' +
    '<div class="user-avatar-large" style="background:linear-gradient(135deg,#2a2a2a,#111);border:1px solid rgba(255,255,255,.15)">' + initials + '</div>' +

function renderMobileHeader() {
  var titles = {home:'DASHBOARD',stencil:'STENCIL',enhance:'ENHANCE',generate:'CREATE',subscription:'PLANS',profile:'PROFILE',settings:'SETTINGS',admin:'ADMIN'};
  return '<div class="mobile-header">' +
    '<div style="display:flex;align-items:center;gap:10px">' +
    '<div class="logo-mark" style="width:30px;height:30px;border-radius:7px">' + logoSVG(15,'#111') + '</div>' +

    '<button class="mobile-logout btn-logout">' +

    'SIGN OUT</button></div>';
}

function renderTabBar() {
  var isAdmin = STATE.user && STATE.user.role === 'super_admin';
  function tab(id, icon, label, cls) {
    return '<button class="tab-item' + (STATE.page===id?' active':'') + (cls?' '+cls:'') + '" data-nav="' + id + '">' +
      '<div class="' + (cls||'tab-icon-wrap') + '"><svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8">' + icon + '</svg></div>' +
      '<span class="tab-label">' + label + '</span></button>';
  }
  return '<nav class="tab-bar">' +
    tab('home',     '<path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/>', 'HOME') +
    tab('stencil',  '<path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 013 3L7 19l-4 1 1-4L16.5 3.5z"/>', 'STENCIL') +
    tab('generate', '<path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/>', 'CREATE', 'tab-create') +
    tab('enhance',  '<path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z"/>', 'ENHANCE') +
    tab('profile',  '<path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/>', 'PROFILE') +
    '</nav>';
}

function renderPage() {
  if (STATE.page==='home')         return renderHome();
  if (STATE.page==='stencil')      return renderStencil();
  if (STATE.page==='enhance')      return renderEnhance();
  if (STATE.page==='generate')     return renderGenerate();
  if (STATE.page==='subscription') return renderSubscription();
  if (STATE.page==='profile')      return renderProfile();
  if (STATE.page==='settings')     return renderSettings();
  if (STATE.page==='admin')        return renderAdmin();

async function callReplicate(model, input) {
  var token = STATE.replicateKey || '';
  if (!token || token.includes('PASTE')) throw new Error('No Replicate key — add it in Settings');
  var BASE = '/api/replicate';
  var createResp;
  try {
    createResp = await fetch(BASE + '/predictions', {
      method: 'POST',
      headers: {'Content-Type':'application/json','Authorization':'Token ' + token},
      body: JSON.stringify({ version: model, input: input })
    });
  } catch(fetchErr) {
    try {
      createResp = await fetch('https://api.replicate.com/v1/predictions', {
        method: 'POST',
        headers: {'Content-Type':'application/json','Authorization':'Token ' + token},
        body: JSON.stringify({ version: model, input: input })
      });
    } catch(e2) { throw new Error('Cannot reach Replicate API'); }
  }
  if (!createResp.ok) {
    var e = await createResp.json().catch(function(){ return {}; });
    throw new Error(e.detail || ('Replicate error ' + createResp.status));
  }
  var pred = await createResp.json();
  var start = Date.now();
  while (pred.status !== 'succeeded' && pred.status !== 'failed') {
    if (Date.now() - start > 180000) throw new Error('Timed out after 3 minutes');
    await new Promise(function(r){ setTimeout(r, 2000); });
    var pollUrl = pred.urls.get.replace('https://api.replicate.com/v1/', BASE + '/');
    var pollResp;
    try {
      pollResp = await fetch(pollUrl, {headers:{'Authorization':'Token ' + token}});
    } catch(e) {
      pollResp = await fetch(pred.urls.get, {headers:{'Authorization':'Token ' + token}});
    }
    pred = await pollResp.json();
  }
  if (pred.status === 'failed') throw new Error(pred.error || 'Replicate job failed');
  return pred.output;
}

async function callClaude(messages, maxTokens) {
  var key = STATE.apiKey || '';
  if (!key || key.length < 10) throw new Error('No API key — contact support');

  var resp;
  try {
    resp = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'x-api-key': key,
        'anthropic-version': '2023-06-01',
        'anthropic-dangerous-direct-browser-access': 'true'
      },
      body: JSON.stringify({
        model: 'claude-sonnet-4-5',
        max_tokens: maxTokens || 4096,
        messages: messages
      })
    });
  } catch(e) {
    throw new Error('Network error — check your connection');
  }

  var text = await resp.text();
  var d;
  try { d = JSON.parse(text); } catch(e) {
    throw new Error('Bad API response (status ' + resp.status + ')');
  }
  if (!resp.ok) throw new Error((d.error && d.error.message) || ('HTTP ' + resp.status));
  if (!d.content || !d.content.length) throw new Error('Empty response — try again');
  return d.content.map(function(b){ return b.text || ''; }).join('');
}

async function imageToBase64(src) {
  if (src.startsWith('data:')) {
    var mime = src.split(';')[0].split(':')[1] || 'image/jpeg';
    if (mime === 'image/svg+xml') mime = 'image/png';
    return { mime: mime, b64: src.split(',')[1] };
  }
  var resp = await fetch(src);
  var blob = await resp.blob();
  return new Promise(function(res, rej) {
    var r = new FileReader();
    r.onload = function(){ res({ mime: r.result.split(';')[0].split(':')[1], b64: r.result.split(',')[1] }); };
    r.onerror = rej;
    r.readAsDataURL(blob);
  });
}


var _cvLoaded=false,_cvLoading=false,_cvCBs=[];
function loadOpenCV(){
  return new Promise(function(res){
    if(_cvLoaded){res();return;}
    if(_cvLoading){_cvCBs.push(res);return;}
    _cvLoading=true;_cvCBs.push(res);
    var s=document.createElement('script');
    s.src='https://cdnjs.cloudflare.com/ajax/libs/opencv.js/4.8.0/opencv.js';
    s.async=true;
    s.onload=function(){
      var check=function(){
        if(typeof cv!=='undefined'&&cv.Mat){
          _cvLoaded=true;_cvLoading=false;
          _cvCBs.forEach(function(c){c();});_cvCBs=[];
        } else {setTimeout(check,150);}
      };
      setTimeout(check,200);
    };
    s.onerror=function(){_cvLoading=false;_cvCBs.forEach(function(c){c();});_cvCBs=[];};
    document.head.appendChild(s);
  });
}

function opencvEdges(canvas, mode){
  if(typeof cv==='undefined'||!cv.Mat) return null;
  try{
    var src=cv.imread(canvas);
    var gray=new cv.Mat();
    cv.cvtColor(src,gray,cv.COLOR_RGBA2GRAY);
    var bilat=new cv.Mat();
    var sigS=mode==='simple'?14:mode==='expert'?5:9;
    var sigR=mode==='simple'?40:mode==='expert'?20:30;
    cv.bilateralFilter(gray,bilat,sigS,sigR,sigR);
    var thresh=new cv.Mat();
    var blk=mode==='simple'?31:mode==='expert'?11:21;
    var C=mode==='simple'?8:mode==='expert'?3:5;
    cv.adaptiveThreshold(bilat,thresh,255,cv.ADAPTIVE_THRESH_GAUSSIAN_C,cv.THRESH_BINARY_INV,blk,C);
    var edges=new cv.Mat();
    var lo=mode==='simple'?60:mode==='expert'?20:35;
    var hi=mode==='simple'?140:mode==='expert'?60:90;
    cv.Canny(bilat,edges,lo,hi);
    var combo=new cv.Mat();
    cv.bitwise_or(thresh,edges,combo);
    var k=cv.getStructuringElement(cv.MORPH_ELLIPSE,new cv.Size(2,2));
    var clean=new cv.Mat();
    cv.morphologyEx(combo,clean,cv.MORPH_OPEN,k);
    cv.morphologyEx(clean,clean,cv.MORPH_CLOSE,k);
    if(mode==='expert'){
      var k2=cv.getStructuringElement(cv.MORPH_RECT,new cv.Size(2,2));
      cv.dilate(clean,clean,k2);k2.delete();
    }
    var inv=new cv.Mat();
    cv.bitwise_not(clean,inv);
    cv.cvtColor(inv,inv,cv.COLOR_GRAY2RGBA);
    cv.imshow(canvas,inv);
    [src,gray,bilat,thresh,edges,combo,k,clean,inv].forEach(function(m){try{m.delete();}catch(e){}});
    return canvas.toDataURL('image/png');
  }catch(e){console.error('cv err',e);return null;}
}
async function generateStencil(){
  if(!STATE.stencilInput||STATE.stencilLoading)return;
  STATE.stencilLoading=true;STATE.stencilEdges=null;render();
  var mode=STATE.stencilSettings.level;
  var hasRep=STATE.replicateKey&&STATE.replicateKey.length>10&&!STATE.replicateKey.includes('PASTE');
  try{
    var img=new Image();
    await new Promise(function(res,rej){img.onload=res;img.onerror=rej;img.src=STATE.stencilInput;});
    var SIZE=1024;
    var canvas=document.getElementById('stencilCanvas');
    canvas.width=SIZE;canvas.height=SIZE;
    var ctx=canvas.getContext('2d');
    var sc=Math.min(SIZE/img.width,SIZE/img.height);
    var sw=Math.round(img.width*sc),sh=Math.round(img.height*sc);
    var ox=Math.round((SIZE-sw)/2),oy=Math.round((SIZE-sh)/2);
    ctx.fillStyle='#fff';ctx.fillRect(0,0,SIZE,SIZE);
    ctx.drawImage(img,ox,oy,sw,sh);
    if(hasRep){
      try{
        // Prepare source image as data URL (1024x1024 with white pad) for Nano Banana
        var srcDataUrl=canvas.toDataURL('image/png');
        // Mode-specific line art prompts for google/nano-banana-2
        var bananaPrompts={
          simple:'Convert this photograph into a clean tattoo stencil line drawing. Pure black continuous outlines on pure white background. Bold confident single-weight lines tracing only the main contours and key features. Remove all shading, gradients, color, grey tones, and fills. The result must look like a printable tattoo stencil — crisp vector-style line art, nothing else. No watermark, no text, no signature.',
          moderate:'Convert this photograph into a professional tattoo stencil line drawing. Clean black lines on pure white background. Use varied line weights — thicker bold outlines for main features (face contour, jawline, major shapes) and thinner lines for interior detail (eyes, lips, individual hair strands). Preserve all key shapes and flourishes as continuous flowing curves. No shading, no grey, no color, no fill — only black lines on white. Printable tattoo stencil, thermal transfer ready. No watermark, no text.',
          expert:'Convert this photograph into a master-level tattoo stencil line drawing in the style of professional tattoo artists. Pure black ink lines on pure white paper. Use three distinct line weights: thick bold for primary outlines, medium for secondary features, fine for intricate detail (individual eyelashes, lip texture, hair strands, decorative flourishes). Redraw all features as clean continuous vector-style curves — do not trace photographic edges. Include dashed or implied construction lines where appropriate for shading guidance. Zero grey, zero color, zero fill, zero gradient. Stencil must be ready for thermal transfer to skin. No watermark, no signature, no text.'
        };
        var bananaPrompt=bananaPrompts[mode]||bananaPrompts.moderate;
        var output=await callReplicate('google/nano-banana-2',{
          prompt:bananaPrompt,
          image_input:[srcDataUrl],
          output_format:'png',
          aspect_ratio:'match_input_image'
        });
        var aiUrl=Array.isArray(output)?output[0]:output;
        var aiImg=new Image();aiImg.crossOrigin='anonymous';
        await new Promise(function(res,rej){aiImg.onload=res;aiImg.onerror=rej;aiImg.src=aiUrl;});
        // Resize output to 1024 square white canvas
        canvas.width=SIZE;canvas.height=SIZE;
        ctx.fillStyle='#fff';ctx.fillRect(0,0,SIZE,SIZE);
        var osc=Math.min(SIZE/aiImg.width,SIZE/aiImg.height);
        var osw=Math.round(aiImg.width*osc),osh=Math.round(aiImg.height*osc);
        var oox=Math.round((SIZE-osw)/2),ooy=Math.round((SIZE-osh)/2);
        ctx.drawImage(aiImg,oox,ooy,osw,osh);
        // Threshold to pure black/white for true stencil output
        var final=null;
        try{
          var d=ctx.getImageData(0,0,SIZE,SIZE),out=new ImageData(SIZE,SIZE);
          for(var i=0;i<SIZE*SIZE;i++){
            var lm=0.2126*d.data[i*4]+0.7152*d.data[i*4+1]+0.0722*d.data[i*4+2];
            var ink=lm<200;
            out.data[i*4]=ink?0:255;out.data[i*4+1]=ink?0:255;out.data[i*4+2]=ink?0:255;out.data[i*4+3]=255;
          }
          ctx.putImageData(out,0,0);
          final=canvas.toDataURL('image/png');
        }catch(e){final=canvas.toDataURL('image/png');}
        STATE.stencilOutput=final;STATE.stencilLoading=false;render();showToast('AI stencil generated!','success');return;
      }catch(repErr){console.error('Stencil AI error:',repErr);showToast('AI error — using local: '+repErr.message,'error');}
    }
    ctx.fillStyle='#fff';ctx.fillRect(0,0,SIZE,SIZE);ctx.drawImage(img,ox,oy,sw,sh);
    var cvR=null;
    try{await loadOpenCV();if(typeof cv!=='undefined'&&cv.Mat)cvR=opencvEdgesFaithful(canvas,mode);}catch(e){}
    if(cvR){STATE.stencilOutput=cvR;STATE.stencilLoading=false;render();showToast('Stencil generated!','success');return;}
    ctx.fillStyle='#fff';ctx.fillRect(0,0,SIZE,SIZE);ctx.drawImage(img,ox,oy,sw,sh);
    var id=ctx.getImageData(0,0,SIZE,SIZE);
    var res=processStencilPipeline(id,SIZE,SIZE,mode);
    ctx.putImageData(res.pixels,0,0);STATE.stencilEdges=res.edges;
    STATE.stencilOutput=canvas.toDataURL('image/png');
    STATE.stencilLoading=false;render();showToast('Stencil generated!','success');
  }catch(err){STATE.stencilLoading=false;render();showToast('Error: '+err.message,'error');}
}

function opencvEdgesFaithful(canvas,mode){
  if(typeof cv==='undefined'||!cv.Mat)return null;
  try{
    var src=cv.imread(canvas),gray=new cv.Mat();
    cv.cvtColor(src,gray,cv.COLOR_RGBA2GRAY);
    var bilat=new cv.Mat();
    var bd=mode==='simple'?12:mode==='expert'?4:7;
    var bs=mode==='simple'?35:mode==='expert'?15:25;
    cv.bilateralFilter(gray,bilat,bd,bs,bs);
    var blr=new cv.Mat();cv.GaussianBlur(bilat,blr,new cv.Size(0,0),3);
    var sharp=new cv.Mat();cv.addWeighted(bilat,1.5,blr,-0.5,0,sharp);
    var edges=new cv.Mat();
    var lo=mode==='simple'?40:mode==='expert'?15:25;
    var hi=mode==='simple'?120:mode==='expert'?50:80;
    cv.Canny(sharp,edges,lo,hi);
    var dk=cv.getStructuringElement(cv.MORPH_RECT,new cv.Size(mode==='simple'?3:2,mode==='simple'?3:2));
    var dil=new cv.Mat();cv.dilate(edges,dil,dk);
    var ath=new cv.Mat();
    var blk=mode==='simple'?41:mode==='expert'?15:25;
    cv.adaptiveThreshold(bilat,ath,255,cv.ADAPTIVE_THRESH_GAUSSIAN_C,cv.THRESH_BINARY_INV,blk,mode==='simple'?10:mode==='expert'?4:7);
    var combo=new cv.Mat();cv.bitwise_or(dil,ath,combo);
    var k2=cv.getStructuringElement(cv.MORPH_ELLIPSE,new cv.Size(2,2));
    var clean=new cv.Mat();cv.morphologyEx(combo,clean,cv.MORPH_OPEN,k2);
    var inv=new cv.Mat();cv.bitwise_not(clean,inv);
    cv.cvtColor(inv,inv,cv.COLOR_GRAY2RGBA);
    cv.imshow(canvas,inv);
    [src,gray,bilat,blr,sharp,edges,dk,dil,ath,combo,k2,clean,inv].forEach(function(m){try{m.delete();}catch(e){}});
    return canvas.toDataURL('image/png');
  }catch(e){console.error('opencvEdgesFaithful:',e);return null;}
}

function processStencilPipeline(imageData, w, h, mode) {
  /* STENCIL LAB v3.0 — XDoG+Bilateral+Guided+CLAHE+Morph+MultiScale */
  var data = imageData.data, N = w * h;

  function gaussBlur(src, sig) {
    if (sig < 0.1) { var o=new Float32Array(N); o.set(src); return o; }
    var r=Math.ceil(sig*3), sz=r*2+1, k=new Float32Array(sz), ks=0;
    for(var j=0;j<sz;j++){k[j]=Math.exp(-(j-r)*(j-r)/(2*sig*sig));ks+=k[j];}
    for(var j=0;j<sz;j++) k[j]/=ks;
    var tmp=new Float32Array(N), out=new Float32Array(N);
    for(var y=0;y<h;y++) for(var x=0;x<w;x++){
      var v=0,ws=0;
      for(var j=0;j<sz;j++){var xx=x+j-r;if(xx<0||xx>=w)continue;v+=src[y*w+xx]*k[j];ws+=k[j];}
      tmp[y*w+x]=v/ws;
    }
    for(var y=0;y<h;y++) for(var x=0;x<w;x++){
      var v=0,ws=0;
      for(var j=0;j<sz;j++){var yy=y+j-r;if(yy<0||yy>=h)continue;v+=tmp[yy*w+x]*k[j];ws+=k[j];}
      out[y*w+x]=v/ws;
    }
    return out;
  }

  // STAGE 1: Luminance + CLAHE (local contrast normalisation per 32px tile)
  var lum = new Float32Array(N);
  for(var i=0;i<N;i++) lum[i]=0.2126*data[i*4]+0.7152*data[i*4+1]+0.0722*data[i*4+2];
  var tileSize=32, norm=new Float32Array(N);
  for(var ty=0;ty<h;ty+=tileSize) for(var tx=0;tx<w;tx+=tileSize){
    var sum=0,sum2=0,cnt=0;
    for(var dy=0;dy<tileSize&&ty+dy<h;dy++) for(var dx=0;dx<tileSize&&tx+dx<w;dx++){
      var v=lum[(ty+dy)*w+(tx+dx)]; sum+=v; sum2+=v*v; cnt++;
    }
    var mean=sum/cnt, std=Math.sqrt(Math.max(1,sum2/cnt-mean*mean)), s=40/std;
    for(var dy=0;dy<tileSize&&ty+dy<h;dy++) for(var dx=0;dx<tileSize&&tx+dx<w;dx++){
      var idx=(ty+dy)*w+(tx+dx);
      norm[idx]=Math.max(0,Math.min(255,128+(lum[idx]-mean)*s));
    }
  }

  // STAGE 2: Guided filter (structure-preserving, better than plain Gaussian)
  function guidedFilterApprox(I, r, eps) {
    function boxBlur(src, rad) {
      var tmp=new Float32Array(N), out=new Float32Array(N);
      for(var y=0;y<h;y++){var s=0,cnt=0;
        for(var x=0;x<=rad&&x<w;x++){s+=src[y*w+x];cnt++;}
        for(var x=0;x<w;x++){out[y*w+x]=s/cnt;
          if(x+rad+1<w){s+=src[y*w+(x+rad+1)];cnt++;}
          if(x-rad>=0){s-=src[y*w+(x-rad)];cnt--;}
        }
      }
      for(var x=0;x<w;x++){var s=0,cnt=0;
        for(var y=0;y<=rad&&y<h;y++){s+=out[y*w+x];cnt++;}
        for(var y=0;y<h;y++){tmp[y*w+x]=s/cnt;
          if(y+rad+1<h){s+=out[(y+rad+1)*w+x];cnt++;}
          if(y-rad>=0){s-=out[(y-rad)*w+x];cnt--;}
        }
      }
      return tmp;
    }
    var mI=boxBlur(I,r), mII=new Float32Array(N);
    for(var i=0;i<N;i++) mII[i]=I[i]*I[i];
    var mII2=boxBlur(mII,r), a=new Float32Array(N), b=new Float32Array(N);
    for(var i=0;i<N;i++){var v=mII2[i]-mI[i]*mI[i];a[i]=v/(v+eps);b[i]=(1-a[i])*mI[i];}
    var mA=boxBlur(a,r), mB=boxBlur(b,r), out=new Float32Array(N);
    for(var i=0;i<N;i++) out[i]=mA[i]*I[i]+mB[i];
    return out;
  }
  var guided = guidedFilterApprox(norm, 4, 100);

  // STAGE 3: Bilateral filter (edge-preserving denoise)
  function bilateralFilter(src, sigmaS, sigmaR) {
    var r=Math.ceil(sigmaS*2), out=new Float32Array(N);
    var sigS2=2*sigmaS*sigmaS, sigR2=2*sigmaR*sigmaR;
    for(var y=0;y<h;y++) for(var x=0;x<w;x++){
      var cx=src[y*w+x], wSum=0, vSum=0;
      for(var dy=-r;dy<=r;dy++) for(var dx=-r;dx<=r;dx++){
        var nx=x+dx,ny=y+dy;
        if(nx<0||nx>=w||ny<0||ny>=h) continue;
        var nv=src[ny*w+nx];
        var wt=Math.exp(-(dx*dx+dy*dy)/sigS2)*Math.exp(-(cx-nv)*(cx-nv)/sigR2);
        wSum+=wt; vSum+=wt*nv;
      }
      out[y*w+x]=vSum/wSum;
    }
    return out;
  }

  // STAGE 4: XDoG — gold-standard sketch/line extraction (SIGGRAPH 2012)
  function xdog(src, sigma, k, eps, phi, tau) {
    var g1=gaussBlur(src,sigma), g2=gaussBlur(src,sigma*k), out=new Float32Array(N);
    for(var i=0;i<N;i++){
      var d=(g1[i]-tau*g2[i])/255.0;
      out[i]=(d>=eps)?255.0:255.0*(1.0+Math.tanh(phi*(d-eps)));
    }
    return out;
  }

  // STAGE 5: Full Canny with hysteresis
  function cannyFull(src, sigma, hiRatio, loRatio) {
    var blurred=gaussBlur(src,sigma);
    var gx=new Float32Array(N),gy=new Float32Array(N),mag=new Float32Array(N);
    for(var y=1;y<h-1;y++) for(var x=1;x<w-1;x++){
      var tl=blurred[(y-1)*w+(x-1)],tc=blurred[(y-1)*w+x],tr=blurred[(y-1)*w+(x+1)];
      var cl=blurred[y*w+(x-1)],cr=blurred[y*w+(x+1)];
      var bl=blurred[(y+1)*w+(x-1)],bc=blurred[(y+1)*w+x],br=blurred[(y+1)*w+(x+1)];
      gx[y*w+x]=-tl-2*cl-bl+tr+2*cr+br;
      gy[y*w+x]=-tl-2*tc-tr+bl+2*bc+br;
      mag[y*w+x]=Math.sqrt(gx[y*w+x]*gx[y*w+x]+gy[y*w+x]*gy[y*w+x]);
    }
    var thin=new Float32Array(N);
    for(var y=1;y<h-1;y++) for(var x=1;x<w-1;x++){
      var v=mag[y*w+x]; if(v<0.5) continue;
      var a=Math.atan2(gy[y*w+x],gx[y*w+x]);
      var x1=Math.round(x+Math.cos(a)),y1=Math.round(y+Math.sin(a));
      var x2=Math.round(x-Math.cos(a)),y2=Math.round(y-Math.sin(a));
      var n1=(y1>=0&&y1<h&&x1>=0&&x1<w)?mag[y1*w+x1]:0;
      var n2=(y2>=0&&y2<h&&x2>=0&&x2<w)?mag[y2*w+x2]:0;
      if(v>=n1&&v>=n2) thin[y*w+x]=v;
    }
    var mx=0; for(var i=0;i<N;i++) if(thin[i]>mx) mx=thin[i];
    if(mx===0) return new Uint8Array(N);
    var hi=mx*hiRatio, lo=mx*loRatio, st=new Uint8Array(N);
    for(var i=0;i<N;i++){if(thin[i]>=hi)st[i]=2;else if(thin[i]>=lo)st[i]=1;}
    var vis=new Uint8Array(N), stk=[];
    for(var i=0;i<N;i++) if(st[i]===2) stk.push(i);
    while(stk.length){
      var idx=stk.pop(); if(vis[idx]) continue; vis[idx]=1;
      var px=idx%w, py=(idx-px)/w;
      for(var dy=-1;dy<=1;dy++) for(var dx=-1;dx<=1;dx++){
        if(!dx&&!dy) continue;
        var nx2=px+dx,ny2=py+dy;
        if(nx2<0||nx2>=w||ny2<0||ny2>=h) continue;
        var ni=ny2*w+nx2;
        if(!vis[ni]&&st[ni]>=1){st[ni]=2;stk.push(ni);}
      }
    }
    var out=new Uint8Array(N);
    for(var i=0;i<N;i++) out[i]=vis[i]?255:0;
    return out;
  }

  // STAGE 6: Mode params (research-tuned for tattoo stencils)
  var p;
  if(mode==='simple'){
    p={bilS:7,bilR:40,xSig:2.2,xK:5.5,xEps:0.01,xPhi:14,xTau:0.99,cSig:3.5,cHi:0.30,cLo:0.10,ms:false,tonal:false};
  } else if(mode==='expert'){
    p={bilS:2,bilR:15,xSig:0.8,xK:2.1,xEps:0.022,xPhi:8,xTau:0.96,cSig:1.0,cHi:0.14,cLo:0.04,ms:true,tonal:true};
  } else {
    p={bilS:4,bilR:25,xSig:1.3,xK:3.2,xEps:0.016,xPhi:10,xTau:0.97,cSig:1.8,cHi:0.20,cLo:0.07,ms:false,tonal:false};
  }

  var bilateral=bilateralFilter(guided,p.bilS,p.bilR);
  var xdogP=xdog(bilateral,p.xSig,p.xK,p.xEps,p.xPhi,p.xTau);
  var primaryEdges=new Uint8Array(N);
  for(var i=0;i<N;i++) primaryEdges[i]=xdogP[i]<128?255:0;

  // Multi-scale XDoG (expert: 3 passes for line hierarchy)
  var fineEdges=new Uint8Array(N), medEdges=new Uint8Array(N);
  if(p.ms){
    var xdogFine=xdog(bilateral,p.xSig*0.5,p.xK*0.8,p.xEps*1.5,p.xPhi*0.8,p.xTau);
    for(var i=0;i<N;i++) fineEdges[i]=xdogFine[i]<90?255:0;
    var xdogMed=xdog(bilateral,p.xSig*1.8,p.xK*1.3,p.xEps*0.6,p.xPhi*1.2,p.xTau);
    for(var i=0;i<N;i++) medEdges[i]=xdogMed[i]<160?255:0;
    for(var i=0;i<N;i++) if(primaryEdges[i]) fineEdges[i]=0;
    for(var i=0;i<N;i++) if(primaryEdges[i]||fineEdges[i]) medEdges[i]=0;
  }

  // Merge canny
  var cannyEdges=cannyFull(bilateral,p.cSig,p.cHi,p.cLo);
  for(var i=0;i<N;i++) if(!primaryEdges[i]&&cannyEdges[i]) primaryEdges[i]=180;

  // Tonal boundaries (expert)
  var tonalEdges=new Uint8Array(N);
  if(p.tonal){
    var coarseBil=bilateralFilter(norm,10,50);
    var tXdog=xdog(coarseBil,3.0,2.0,0.030,6,0.95);
    var tCanny=cannyFull(coarseBil,4.0,0.32,0.13);
    for(var i=0;i<N;i++){if(tXdog[i]<130||tCanny[i]>0) tonalEdges[i]=255;}
    for(var i=0;i<N;i++) if(primaryEdges[i]>0) tonalEdges[i]=0;
  }

  // STAGE 7: Morphological cleanup (remove noise, close gaps)
  function morphClean(edges){
    var out=new Uint8Array(N);
    for(var y=1;y<h-1;y++) for(var x=1;x<w-1;x++){
      var idx=y*w+x; if(!edges[idx]) continue;
      var n=0;
      if(edges[(y-1)*w+x])n++;if(edges[(y+1)*w+x])n++;
      if(edges[y*w+(x-1)])n++;if(edges[y*w+(x+1)])n++;
      if(edges[(y-1)*w+(x-1)])n++;if(edges[(y-1)*w+(x+1)])n++;
      if(edges[(y+1)*w+(x-1)])n++;if(edges[(y+1)*w+(x+1)])n++;
      if(n>=3) out[idx]=edges[idx];
    }
    return out;
  }
  function gapClose(edges){
    var out=new Uint8Array(N);
    for(var i=0;i<N;i++) out[i]=edges[i];
    for(var y=2;y<h-2;y++) for(var x=2;x<w-2;x++){
      if(out[y*w+x]) continue;
      var hor=out[y*w+(x-1)]&&out[y*w+(x+1)];
      var ver=out[(y-1)*w+x]&&out[(y+1)*w+x];
      var d1=out[(y-1)*w+(x-1)]&&out[(y+1)*w+(x+1)];
      var d2=out[(y-1)*w+(x+1)]&&out[(y+1)*w+(x-1)];
      if(hor||ver||d1||d2) out[y*w+x]=150;
    }
    return out;
  }

  var cleanP=morphClean(morphClean(primaryEdges)), closedP=gapClose(cleanP);
  var cleanF=p.ms?morphClean(fineEdges):new Uint8Array(N);
  var cleanT=p.tonal?morphClean(tonalEdges):new Uint8Array(N);

  // STAGE 8: Stroke width normalisation (lines <1.5px dilated for thermal printing)
  function dilate1px(edges){
    var out=new Uint8Array(N);
    for(var i=0;i<N;i++) out[i]=edges[i];
    for(var y=1;y<h-1;y++) for(var x=1;x<w-1;x++){
      if(edges[y*w+x]) continue;
      if(edges[(y-1)*w+x]===255||edges[(y+1)*w+x]===255||
         edges[y*w+(x-1)]===255||edges[y*w+(x+1)]===255) out[y*w+x]=100;
    }
    return out;
  }
  var finalP=mode==='expert'?closedP:dilate1px(closedP);
  var finalF=p.ms?gapClose(cleanF):new Uint8Array(N);
  var finalT=p.tonal?cleanT:new Uint8Array(N);

  // STAGE 9: Render — 4-level line weights on pure white
  var intensity=STATE.stencilSettings?(STATE.stencilSettings.lineIntensity||0.85):0.85;
  var baseOpacity=0.25+0.75*Math.pow(intensity,0.6);
  var out_img=new ImageData(w,h);
  for(var i=0;i<N;i++){
    var weight=0;
    if(finalP[i]===255) weight=1.00;
    else if(finalF[i]===255) weight=0.72;
    else if(finalP[i]===180) weight=0.68;
    else if(finalP[i]===150) weight=0.55;
    else if(finalP[i]===100) weight=0.40;
    else if(finalF[i]>0) weight=0.35;
    else if(finalT[i]>0) weight=0.22;
    if(weight===0){
      out_img.data[i*4]=255;out_img.data[i*4+1]=255;out_img.data[i*4+2]=255;out_img.data[i*4+3]=255;
    } else {
      var minA=(weight>=0.95)?0.82:(weight>=0.60)?0.62:0.38;
      if(mode==='simple') minA=Math.max(minA,0.88);
      var alpha=Math.max(Math.min(1,weight*baseOpacity*1.4),minA);
      var v=Math.round(255*(1-alpha));
      out_img.data[i*4]=v;out_img.data[i*4+1]=v;out_img.data[i*4+2]=v;out_img.data[i*4+3]=255;
    }
  }
  STATE.stencilEdges=finalP; STATE.stencilFine=finalF; STATE.stencilTonal=finalT; STATE.stencilMode=mode;
  return {pixels:out_img, edges:finalP};
}

function adjustIntensity(val) {
  val = parseFloat(val);
  STATE.stencilSettings.lineIntensity = val;
  var el = document.getElementById('intensity-val');
  if (el) el.textContent = Math.round(val*100) + '%';
  if (!STATE.stencilEdges) return;

  var canvas = document.getElementById('stencilCanvas');
  var ctx = canvas.getContext('2d');
  var w=canvas.width, h=canvas.height;
  var coarse = STATE.stencilEdges;
  var fine   = STATE.stencilFine   || new Uint8Array(w*h);
  var tonal  = STATE.stencilTonal  || new Uint8Array(w*h);
  var mode   = STATE.stencilMode   || 'moderate';
  var opacity = 0.2 + 0.8 * Math.pow(val, 0.5);
  var out = new ImageData(w, h);

  for (var i=0;i<w*h;i++) {
    var weight = 0;
    if (coarse[i]===255) weight=1.0;
    else if (coarse[i]===128) weight=0.75;
    else if (fine[i]===255)   weight=0.55;
    else if (fine[i]===128)   weight=0.38;
    else if (tonal[i]>0)      weight=0.25;
    if (weight===0){
      out.data[i*4]=255;out.data[i*4+1]=255;out.data[i*4+2]=255;out.data[i*4+3]=255;
    } else {
      var alpha=Math.min(1,weight*opacity*1.3);
      var v=Math.round(255*(1-alpha));
      v=Math.min(v,mode==='simple'?60:mode==='moderate'?40:20);
      out.data[i*4]=v;out.data[i*4+1]=v;out.data[i*4+2]=v;out.data[i*4+3]=255;
    }
  }
  ctx.putImageData(out,0,0);
  STATE.stencilOutput=canvas.toDataURL('image/png');
  var img=document.getElementById('stencil-result');
  if(img) img.src=STATE.stencilOutput;
}

async function generateWithClaude(userPrompt, palette) {
  if (!STATE.apiKey || STATE.apiKey.length < 10) {
    throw new Error('Add an Anthropic API key in Settings, or add a Replicate key for FLUX image generation');
  }
  var colourNote = palette === 'bw'
    ? 'STRICT MONOCHROME: use only blacks, greys, and white. No colour at all. Maximum cinematic contrast.'
    : 'VIVID FULL COLOUR: rich saturated photorealistic colours, cinematic lighting.';
  var raw = await callClaude([{
    role: 'user',
    content: 'Create a stunning SVG tattoo artwork (viewBox="0 0 1024 1024") of: ' + userPrompt + '. ' + colourNote + '. Use gradients for depth. 20+ gradient definitions. 80+ layered elements. Dramatic Rembrandt lighting. White background. Respond with ONLY the SVG — start <svg end </svg>.'
  }], 4096);
  var start = raw.indexOf('<svg'), end = raw.lastIndexOf('<\/svg>');
  if (start===-1||end===-1) throw new Error('No image returned — try again');
  var blob = new Blob([raw.slice(start,end+6)], {type:'image/svg+xml'});
  var url = URL.createObjectURL(blob);

  URL.revokeObjectURL(url);
  STATE.genOutput=cv.toDataURL('image/png');
  STATE.genLoading=false;
  render();

async function enhanceWithCanvas() {
  var img = new Image();
  await new Promise(function(res, rej) { img.onload = res; img.onerror = rej; img.src = STATE.enhanceInput; });

  // Work at 2x the original size (upscale via bilinear canvas)
  var W = Math.min(img.width * 2, 2048);
  var H = Math.min(img.height * 2, 2048);

  var cv = document.getElementById('stencilCanvas');
  cv.width = W; cv.height = H;
  var ctx = cv.getContext('2d');

  // Step 1: Draw upscaled with smoothing (bilinear)
  ctx.imageSmoothingEnabled = true;
  ctx.imageSmoothingQuality = 'high';
  ctx.drawImage(img, 0, 0, W, H);
  var d = ctx.getImageData(0, 0, W, H);
  var data = d.data;
  var N = W * H;

  // Step 2: Unsharp mask — sharpen details
  // Blur the image, then add (original - blurred) * amount back
  function gaussBlurRGBA(src, w, h, sig) {
    var r = Math.ceil(sig * 2.5), sz = r*2+1;
    var k = new Float32Array(sz), ks = 0;
    for (var j = 0; j < sz; j++) { k[j] = Math.exp(-(j-r)*(j-r)/(2*sig*sig)); ks += k[j]; }
    for (var j = 0; j < sz; j++) k[j] /= ks;
    var tmp = new Float32Array(w*h*4), out = new Float32Array(w*h*4);
    for (var y = 0; y < h; y++) for (var x = 0; x < w; x++) for (var c = 0; c < 3; c++) {
      var v = 0, ws = 0;
      for (var j = 0; j < sz; j++) {
        var xx = x+j-r; if (xx < 0 || xx >= w) continue;
        v += src[(y*w+xx)*4+c] * k[j]; ws += k[j];
      }
      tmp[(y*w+x)*4+c] = v/ws;
    }
    for (var y = 0; y < h; y++) for (var x = 0; x < w; x++) for (var c = 0; c < 3; c++) {
      var v = 0, ws = 0;
      for (var j = 0; j < sz; j++) {
        var yy = y+j-r; if (yy < 0 || yy >= h) continue;
        v += tmp[(yy*w+x)*4+c] * k[j]; ws += k[j];
      }
      out[(y*w+x)*4+c] = v/ws;
    }
    return out;
  }

  var blurred = gaussBlurRGBA(data, W, H, 1.2);
  var amount = 1.4; // sharpening strength

  // Step 3: CLAHE-lite — local contrast enhancement per 64px tile
  var tileSize = 64;
  var enhanced = new Uint8ClampedArray(data.length);

  for (var i = 0; i < N; i++) {
    for (var c = 0; c < 3; c++) {
      // Unsharp: original + amount*(original - blurred)
      var sharpened = data[i*4+c] + amount * (data[i*4+c] - blurred[i*4+c]);
      enhanced[i*4+c] = Math.max(0, Math.min(255, sharpened));
    }
    enhanced[i*4+3] = 255;
  }

  // Local contrast boost per tile
  for (var ty = 0; ty < H; ty += tileSize) for (var tx = 0; tx < W; tx += tileSize) {
    var sum = 0, cnt = 0;
    for (var dy = 0; dy < tileSize && ty+dy < H; dy++) for (var dx = 0; dx < tileSize && tx+dx < W; dx++) {
      var idx = ((ty+dy)*W+(tx+dx))*4;
      sum += 0.2126*enhanced[idx] + 0.7152*enhanced[idx+1] + 0.0722*enhanced[idx+2];
      cnt++;
    }
    var mean = sum/cnt;
    var contrastFactor = 1.15;
    for (var dy = 0; dy < tileSize && ty+dy < H; dy++) for (var dx = 0; dx < tileSize && tx+dx < W; dx++) {
      var idx = ((ty+dy)*W+(tx+dx))*4;
      for (var c = 0; c < 3; c++) {
        enhanced[idx+c] = Math.max(0, Math.min(255, mean + contrastFactor*(enhanced[idx+c] - mean)));
      }
    }
  }

  // Step 4: Saturation boost (convert to HSL, boost S)
  for (var i = 0; i < N; i++) {
    var ri = enhanced[i*4]/255, gi = enhanced[i*4+1]/255, bi2 = enhanced[i*4+2]/255;
    var max = Math.max(ri,gi,bi2), min = Math.min(ri,gi,bi2);
    var l = (max+min)/2;
    if (max !== min) {
      var s = l > 0.5 ? (max-min)/(2-max-min) : (max-min)/(max+min);
      s = Math.min(1, s * 1.2); // boost saturation 20%
      var q = l < 0.5 ? l*(1+s) : l+s-l*s;
      var p = 2*l-q;
      var h = max===ri ? (gi-bi2)/(max-min)/6 : max===gi ? (bi2-ri)/(max-min)/6+1/3 : (ri-gi)/(max-min)/6+2/3;
      h = (h+1)%1;
      function hue2rgb(p,q,t){t=(t+1)%1;return t<1/6?p+(q-p)*6*t:t<1/2?q:t<2/3?p+(q-p)*(2/3-t)*6:p;}
      enhanced[i*4]   = Math.round(hue2rgb(p,q,h+1/3)*255);
      enhanced[i*4+1] = Math.round(hue2rgb(p,q,h)*255);
      enhanced[i*4+2] = Math.round(hue2rgb(p,q,h-1/3)*255);
    }
  }

  var outData = new ImageData(enhanced, W, H);
  cv.width = W; cv.height = H;
  ctx.putImageData(outData, 0, 0);
  STATE.enhanceOutput = cv.toDataURL('image/jpeg', 0.95);
}

async function subscribePlan() {
  var plan   = STATE.selectedPlan || 'pro';
  var priceId = STATE.stripePrices && STATE.stripePrices[plan];
  var pubKey  = STATE.stripeKey;

  if (!pubKey || pubKey.indexOf('PASTE') >= 0) {
    showToast('Stripe not configured yet', 'error');
    return;
  }
  if (!priceId || priceId.indexOf('PASTE') >= 0) {
    showToast('Price ID not set for ' + plan, 'error');
    return;
  }

  showToast('Loading Stripe...', 'success');

  // Lazy-load Stripe.js only when needed
  try {
    if (typeof Stripe === 'undefined') {
      await new Promise(function(resolve, reject) {
        var s = document.createElement('script');
        s.src = 'https://js.stripe.com/v3/';
        s.onload = resolve;
        s.onerror = function() { reject(new Error('Could not load Stripe')); };
        document.head.appendChild(s);
      });
    }
  } catch(loadErr) {
    showToast('Could not load Stripe: ' + loadErr.message, 'error');
    return;
  }

  try {
    var stripe = Stripe(pubKey);
    var result = await stripe.redirectToCheckout({
      lineItems: [{ price: priceId, quantity: 1 }],
      mode: 'subscription',
      successUrl: window.location.href.split('?')[0] + '?payment=success&plan=' + plan,
      cancelUrl:  window.location.href.split('?')[0] + '?payment=cancelled',
      customerEmail: STATE.user ? STATE.user.email : undefined,
    });
    if (result.error) showToast('Error: ' + result.error.message, 'error');
  } catch(err) {
    showToast('Stripe error: ' + err.message, 'error');
  }
}

function startBA(e) {
  isDraggingBA = true;
  moveBA(e);
}

function moveBA(e) {
  if (!isDraggingBA) return;
  var wrap = document.getElementById('ba-wrap');
  if (!wrap) return;
  var rect = wrap.getBoundingClientRect();
  var clientX = e.touches ? e.touches[0].clientX : e.clientX;
  var pos = Math.max(0.02, Math.min(0.98, (clientX - rect.left) / rect.width));
  STATE.baPosition = pos;
  var after = wrap.querySelector('.ba-after');
  var divider = wrap.querySelector('.ba-divider');
  var handle  = wrap.querySelector('.ba-handle');
  var afterImg = wrap.querySelector('.ba-after img');
  if (after)   after.style.width = (pos*100) + '%';
  if (divider) divider.style.left = (pos*100) + '%';
  if (handle)  handle.style.left  = (pos*100) + '%';
  if (afterImg) afterImg.style.width = (100/pos) + '%';
}

  size = size || 20;

  return '<svg width="' + size + '" height="' + size + '" viewBox="0 0 24 24" fill="none" stroke="' + color + '" stroke-width="2.5"><path stroke-linecap="round" stroke-linejoin="round" d="M9.813 15.904L9 18.75l-.813-2.846a4.5 4.5 0 00-3.09-3.09L2.25 12l2.846-.813a4.5 4.5 0 003.09-3.09L9 5.25l.813 2.846a4.5 4.5 0 003.09 3.09L15.75 12l-2.846.813a4.5 4.5 0 00-3.09 3.09z"/></svg>';
}

async function testApiKey() {
  var el = document.getElementById('test-result');
  if(!el) return;
  el.style.display='block'; el.style.color='var(--text2)'; el.textContent='Testing...';
  var key = STATE.apiKey||'';
  if(!key){el.textContent='No key saved.';return;}
  el.textContent='Sending test request...';
  try {
    var r = await fetch('https://api.anthropic.com/v1/messages',{
      method:'POST',
      headers:{'Content-Type':'application/json','x-api-key':key,'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'},
      body:JSON.stringify({model:'claude-sonnet-4-5',max_tokens:10,messages:[{role:'user',content:'Say OK'}]})
    });
    var text = await r.text();
    el.style.color=r.ok?'var(--success)':'var(--error)';
    el.textContent='HTTP '+r.status+(r.ok?' OK':' ERROR')+'\n'+text.slice(0,300);
  } catch(e){
    el.style.color='var(--error)';
    el.textContent='Error: '+e.message;
  }
}

document.addEventListener('mousemove', moveBA);
document.addEventListener('touchmove', function(e){if(isDraggingBA){e.preventDefault();moveBA(e);}},{passive:false});
document.addEventListener('mouseup', function(){isDraggingBA=false;});
document.addEventListener('touchend', function(){isDraggingBA=false;});

// Handle Stripe redirect return
try {
  if (window.location && window.location.search) {
    var _params = new URLSearchParams(window.location.search);
    var _payment = _params.get('payment');
    var _plan = _params.get('plan');
    if (_payment === 'success' && _plan) {
      try { window.history.replaceState({}, '', window.location.pathname); } catch(e){}
      if (STATE.user) {
        STATE.user.plan = _plan;
        STATE.user.subscribed = true;
        STATE.page = 'profile';
      }
    }
  }
} catch(e) {}

render();
